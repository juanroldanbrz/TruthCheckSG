name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
      OPENAI_KEYS: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run unit tests
        run: uv run pytest tests/ --ignore=tests/e2e -q

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
      OPENAI_KEYS: ${{ secrets.OPENAI_API_KEY }}
      BRIGHTDATA_API_KEY: ${{ secrets.BRIGHTDATA_API_KEY }}
      MONGODB_URL: ${{ secrets.MONGODB_URL }}
      MONGODB_DB: fact_verifier

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run E2E tests
        run: uv run pytest tests/e2e -m "not fact_checker" -q --tb=short

  fact-checker:
    name: Fact Checker
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
      OPENAI_KEYS: ${{ secrets.OPENAI_API_KEY }}
      BRIGHTDATA_API_KEY: ${{ secrets.BRIGHTDATA_API_KEY }}
      MONGODB_URL: ${{ secrets.MONGODB_URL }}
      MONGODB_DB: fact_verifier

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run fact checker tests
        run: uv run pytest -m fact_checker -q --tb=short
