name: Fact Checker

on:
  workflow_dispatch:

jobs:
  fact-checker:
    name: Fact Checker
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    env:
      BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
      OPENAI_KEYS: ${{ secrets.OPENAI_API_KEY }}
      BRIGHTDATA_API_KEY: ${{ secrets.BRIGHTDATA_API_KEY }}
      MONGODB_URL: mongodb://localhost:27017
      MONGODB_DB: fact_verifier
      OPENAI_MODEL: gpt-4.1-2025-04-14
      MAX_OUTPUT_TOKENS: 32768
      MAX_SOURCES: 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run fact checker tests
        run: uv run pytest -m fact_checker -v --tb=short
